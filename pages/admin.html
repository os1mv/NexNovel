<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | NovelNest</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body id="admin-page">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand"><a href="../index.html" data-i18n="adminDashboard">NovelNest Admin</a></div>
      <div class="header-actions">
        <button id="themeToggle" class="icon-btn" aria-label="Toggle dark mode"></button>
        <a id="authButton" class="nav-btn" href="login.html">Login</a>
      </div>
    </header>

    <aside class="sidebar">
      <nav>
        <a class="nav-link" href="../index.html" data-i18n="home">Home</a>
        <a class="nav-link" href="../pages/profile.html" data-i18n="profile">Profile</a>
        <a class="nav-link active" href="#adminForm" data-i18n="adminTitle">Admin</a>
      </nav>
      <section class="sidebar-card">
        <h3 data-i18n="quickActions">Quick actions</h3>
        <p data-i18n="addOrEditStories">Create a new novel entry or update an existing story from this dashboard.</p>
      </section>
    </aside>

    <main class="content">
      <section class="section-block" id="adminForm">
        <div class="section-header"><div><h2 data-i18n="manageNovels">Manage Novels</h2><p data-i18n="addOrEditStories">Add or edit stories with a quick form.</p></div></div>
        <form id="adminFormElement">
          <input type="hidden" name="novelId" />
          <div class="input-grid">
            <input name="title" type="text" data-i18n="novelTitle" placeholder="Title" required />
            <input name="author" type="text" data-i18n="authorName" placeholder="Author" required />
            <input name="genre" type="text" data-i18n="genreLabel" placeholder="Genre" required />
            <input name="published" type="text" data-i18n="publishedYear" placeholder="Published year" required />
          </div>
          <textarea name="description" rows="5" data-i18n="novelDescription" placeholder="Description" required></textarea>
          <button class="button primary" type="submit" data-i18n="saveNovelButton">Save novel</button>
        </form>
      </section>
      <section class="section-block">
        <div class="section-header"><div><h2 data-i18n="existingNovels">Existing Novels</h2><p data-i18n="editDeleteEntries">Edit or delete entries.</p></div></div>
        <div id="adminList" class="card-grid"></div>
      </section>
    </main>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script src="../script.js"></script>
</body>
</html>
