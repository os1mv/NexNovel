<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | NexNovel</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body id="login-page">
  <main class="content" style="max-width: 560px; margin: 80px auto; padding: 24px;">
    <section class="section-block">
      <div class="section-header"><div><h2 data-i18n="login">Login</h2><p data-i18n="loginComment">Access your profile and continue reading.</p></div></div>
      <form id="loginForm" class="auth-form">
        <input name="email" type="email" data-i18n="email" placeholder="Email" required />
        <input name="password" type="password" data-i18n="password" placeholder="Password" required />
        <button class="button primary" type="submit" data-i18n="login">Login</button>
      </form>
      <p><span data-i18n="newHere">New here?</span> <a class="text-link" href="signup.html" data-i18n="createAccount">Create an account</a></p>
    </section>
  </main>
  <div id="toastContainer" class="toast-container"></div>
  <script src="../script.js"></script>
</body>
</html>
